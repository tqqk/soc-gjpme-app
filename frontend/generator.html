<!DOCTYPE html>
<html lang="cs">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Generátor passphrase</title>
        <link href="./style.css" rel="stylesheet">
        <script defer src="/js/passphrase-gen.js"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    </head>

    <body class="bg-black-white text-black text-base font-robotoMono font-medium accent-black">

        <div class="flex flex-col max-w-lg min-h-screen mx-4 mb-4 sm:mb-0 sm:mx-auto">

            <nav class="flex justify-between items-center px-6 py-3 bg-white rounded-xl my-6 w-full shadow-md">
                <div class="flex items-center font-bold text-lg mr-4">
                    <a href="/" class="mt-[0.05rem]">INFO O HESLECH</a>
                </div>
                
                <ul class="flex items-center gap-4 ml-6 font-normal">
                    <li><a href="/" class="text-gray-500 hover:text-black">info</a></li>
                    <li><a href="/generator.html" class=" text-black hover:text-black">generátor</a></li>
                    <li><a href="/kviz.html" class="text-gray-500 hover:text-black">kvíz</a></li>   
                </ul>
                
            </nav>

            <div class="flex flex-col items-center justify-center mt-[10svh] w-full">
                <h1 class="text-4xl font-bold text-center mb-4">Generátor passphrase</h1>

                <label class="mb-2">Výběr jazyka:</label>
                <fieldset class="border-2 border-black p-2 rounded mb-4 w-full">
                    <div>
                        <input type="checkbox" id="czech" name="czech" checked />
                        <label for="czech">Čeština</label>
                    </div>
                    <div>
                        <input type="checkbox" id="english" name="english" />
                        <label for="english">Angličtina</label>
                    </div>
                </fieldset>

                <label class="mb-2">Počet slov:</label>
                <input id="numberOfWords" type="number" value="4" min="4" max="40" class="border-2 border-black p-2 rounded w-full mb-4">

                <label class="mb-2">Oddělovač slov:</label>
                <select id="separator" class="border-2 border-black p-2 rounded mb-4 w-full">
                    <option value="-">Pomlčka (-)</option>
                    <option value="_">Podtržítko (_)</option>
                    <option value="">Bez oddělovače</option>
                </select>

                <label class="mb-2">Další možnosti:</label>
                <fieldset class="border-2 border-black p-2 rounded mb-4 w-full flex flex-row gap-2 items">
                    <div>
                        <input type="checkbox" id="capitalize" name="capitalize" />
                        <label for="capitalize">Velká písmena</label>
                    </div>
                    <div>
                        <input type="checkbox" id="add-number" name="add-number" />
                        <label for="add-number">Přidat číslo</label>
                    </div>
                </fieldset>

                <button id="generate" class="bg-black text-white hover:bg-opacity-5 hover:text-black border-2 border-black  px-4 py-2 rounded w-full">
                    Vygenerovat passphrase
                </button>

                <div id="passphraseOutput" class="mt-8 p-2 text-center text-xl rounded min-h-16  relative w-full">
                    <button id="copyPassphrase" class="bg-gray-300 text-black hover:bg-gray-200 border-gray-300 border-2 px-2 py-1 rounded absolute top-3 right-3 hidden leading-[0.7rem] text-[0.7rem]">
                    Zkopírovat do schránky
                    </button>
                    <div id="generatedPassphrase" class="px-4 py-10"></div>
                </div>
                
            </div>
        </div>
    </body>

</html>
